<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="50deeds for Clio app icon">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d3a8f"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0a1733" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect width="512" height="512" rx="116" fill="url(#tile)"/>

  <!-- Deed document -->
  <g filter="url(#soft)">
    <rect x="146" y="96" width="220" height="300" rx="24" fill="#ffffff"/>
  </g>
  <!-- Title band -->
  <rect x="178" y="146" width="132" height="20" rx="10" fill="#2563eb"/>
  <!-- Body lines -->
  <rect x="178" y="196" width="156" height="13" rx="6.5" fill="#cdd7e6"/>
  <rect x="178" y="226" width="156" height="13" rx="6.5" fill="#cdd7e6"/>
  <rect x="178" y="256" width="112" height="13" rx="6.5" fill="#cdd7e6"/>

  <!-- "Recorded" seal -->
  <g filter="url(#soft)">
    <circle cx="344" cy="356" r="66" fill="#f59e0b"/>
  </g>
  <circle cx="344" cy="356" r="66" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="4" stroke-dasharray="2 12" stroke-linecap="round"/>
  <path d="M316 357 l18 19 l36 -42" fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
